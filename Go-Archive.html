.bg-shelf{display:none}
.bg-court{display:none}
.bg-spot{z-index:-4;background:
  linear-gradient(180deg, rgba(8,10,9,.55) 0%, rgba(8,10,9,.15) 22%, rgba(8,10,9,.1) 60%, rgba(8,10,9,.65) 100%);
}

.bg-grain{
  z-index:-2;opacity:.045;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.wrap{max-width:600px;margin:0 auto;padding:0 18px;position:relative;z-index:1}

/* ── 헤더 ── */
header{padding:30px 0 4px;text-align:center}
.eyebrow{font-size:11px;letter-spacing:.32em;color:var(--court-bright);font-weight:800;text-transform:uppercase;margin-bottom:8px}
h1{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:.02em;line-height:.95;color:var(--gold);
  text-shadow:0 2px 0 rgba(0,0,0,.4)}
h1 span{color:var(--txt)}
.tagline{font-size:13px;color:var(--txt-dim);margin-top:9px;font-weight:500;letter-spacing:-.01em}

.sync{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0 22px;font-size:11.5px;color:var(--txt-dim);font-weight:600}
.sync .live{display:inline-flex;align-items:center;gap:6px}
.sync .ldot{width:7px;height:7px;border-radius:50%;background:var(--court-bright);box-shadow:0 0 0 3px rgba(63,174,124,.28);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.refresh{background:rgba(240,205,118,.1);border:1px solid var(--line);color:var(--brass-bright);font-weight:800;font-size:11px;letter-spacing:.05em;padding:6px 13px;border-radius:20px;cursor:pointer;transition:.18s}
.refresh:active{transform:scale(.94)}
.refresh.spin{opacity:.55;pointer-events:none}

/* ── UPCOMING: 메인 히어로 섹션 ── */
.hero-tag{display:flex;align-items:baseline;gap:10px;margin:6px 2px 16px}
.hero-tag .flame{font-size:20px}
.hero-tag h2{font-family:'Bebas Neue';font-size:30px;letter-spacing:.03em;color:var(--gold)}
.hero-tag .sub{font-size:12px;color:var(--txt-dim);font-weight:700}

.card{
  position:relative;border-radius:18px;overflow:hidden;margin-bottom:12px;
  background:linear-gradient(160deg,var(--card2),var(--card));
  backdrop-filter:blur(16px) saturate(1.15);-webkit-backdrop-filter:blur(16px) saturate(1.15);
  border:1px solid var(--line);box-shadow:var(--shadow);
  animation:pop .32s ease backwards;cursor:default;transition:.16s;
}
.card.clickable{cursor:pointer}
.card.clickable:active{transform:scale(.985)}
.card.clickable:hover{border-color:var(--brass)}
.card.next{border:1.5px solid rgba(240,205,118,.55);background:linear-gradient(160deg,rgba(111,168,207,.2),var(--card))}
.card.next::before{content:"NEXT UP";position:absolute;top:0;right:0;font-size:9.5px;font-weight:900;letter-spacing:.1em;
  background:var(--gold);color:#241708;padding:4px 12px 4px 14px;border-radius:0 0 0 12px}
.card.hist{opacity:.88}
.card.hist::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--txt-dim);opacity:.4}

.card-body{padding:16px 17px}
.card-row{display:flex;align-items:center;gap:12px}
.card-main{flex:1;min-width:0}
.card-date{font-size:11.5px;font-weight:800;color:var(--court-bright);letter-spacing:.03em;margin-bottom:4px}
.card.hist .card-date{color:var(--txt-dim)}
.card-name{font-family:'Bebas Neue';font-size:25px;letter-spacing:.02em;color:var(--txt);line-height:1.05}
.badge{flex:0 0 auto;font-size:10.5px;font-weight:900;letter-spacing:.05em;padding:6px 12px;border-radius:20px}
.badge.ready{background:var(--gold);color:#241708}
.badge.wait{background:rgba(184,166,140,.15);color:var(--txt-dim)}
.sheet-link{display:inline-flex;align-items:center;gap:5px;margin-top:11px;font-size:11px;font-weight:700;color:var(--txt-dim);
  border-top:1px dashed var(--line);padding-top:9px;cursor:pointer}
.sheet-link:hover{color:var(--brass-bright)}

.empty{text-align:center;padding:48px 20px;color:var(--txt-dim);background:rgba(0,0,0,.18);border-radius:18px;border:1px dashed var(--line)}
.empty .ico{font-size:34px;margin-bottom:10px}
.loader{text-align:center;padding:60px 20px;color:var(--txt-dim)}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── HISTORY: 접어둔 보조 섹션 ── */
.hist-toggle{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:rgba(8,10,9,.45);backdrop-filter:blur(10px);border:1px solid var(--line);color:var(--txt-dim);
  font-weight:700;font-size:12.5px;letter-spacing:.02em;padding:13px;border-radius:14px;cursor:pointer;
  margin:22px 0 0;transition:.18s;
}
.hist-toggle:hover{border-color:var(--brass);color:var(--brass-bright)}
.hist-toggle .chev{transition:.25s;font-size:11px}
.hist-toggle.open .chev{transform:rotate(90deg)}
#historySection{
  max-height:0;overflow:hidden;transition:max-height .38s ease;
}
#historySection.open{max-height:3000px;padding-top:14px}

/* ── FORMAT: 작은 플로팅 버튼 + 사이드 패널 ── */
.format-fab{
  position:fixed;top:18px;right:18px;z-index:50;
  display:flex;align-items:center;gap:6px;
  background:rgba(20,14,10,.72);border:1px solid var(--line);backdrop-filter:blur(6px);
  color:var(--brass-bright);font-weight:800;font-size:11px;letter-spacing:.04em;
  padding:9px 13px;border-radius:30px;cursor:pointer;box-shadow:var(--shadow);
}
.format-fab:active{transform:scale(.94)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;opacity:0;pointer-events:none;transition:.25s;backdrop-filter:blur(2px)}
.scrim.show{opacity:1;pointer-events:auto}
.format-panel{
  position:fixed;top:0;right:0;bottom:0;width:min(320px,86vw);z-index:61;
  background:linear-gradient(165deg,rgba(18,12,8,.92),rgba(10,15,20,.94));backdrop-filter:blur(14px);border-left:1px solid var(--line);
  transform:translateX(100%);transition:.3s cubic-bezier(.2,.8,.2,1);box-shadow:-14px 0 40px rgba(0,0,0,.5);
  display:flex;flex-direction:column;
}
.format-panel.show{transform:translateX(0)}
.fp-head{display:flex;align-items:center;justify-content:space-between;padding:20px 18px 14px;border-bottom:1px solid var(--line)}
.fp-head .ft{font-family:'Bebas Neue';font-size:20px;letter-spacing:.06em;color:var(--gold)}
.fp-close{background:none;border:none;color:var(--txt-dim);font-size:16px;cursor:pointer;padding:4px 8px}
.fp-body{padding:16px 16px 30px;overflow-y:auto}
.res-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);
  border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.16s}
.res-card:hover{border-color:var(--brass)}
.res-ico{flex:0 0 auto;width:36px;height:36px;border-radius:10px;background:rgba(240,205,118,.14);
  display:flex;align-items:center;justify-content:center;font-size:17px}
.res-name{font-size:13.5px;font-weight:700;color:var(--txt)}
.res-sub{font-size:10.5px;color:var(--txt-dim);margin-top:2px}

footer{text-align:center;font-size:11px;color:var(--txt-dim);margin-top:30px;line-height:1.8;opacity:.75}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="bg-layer bg-base"></div>
<div class="bg-layer bg-shelf"></div>
<div class="bg-layer bg-court"></div>
<div class="bg-layer bg-spot"></div>
<div class="bg-layer bg-vignette"></div>
<div class="bg-layer bg-grain"></div>

<button class="format-fab" id="formatFab">📐 FORMAT</button>
<div class="scrim" id="scrim"></div>
<div class="format-panel" id="formatPanel">
  <div class="fp-head"><span class="ft">FORMAT · DOCS</span><button class="fp-close" id="fpClose">✕</button></div>
  <div class="fp-body" id="formatList">
    <div class="loader"><div class="spinner"></div>불러오는 중…</div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="eyebrow">Go Tennis Match History</div>
    <h1>Go <span>Archive</span></h1>
    <div class="tagline">Version 1.0.0</div>
  </header>

  <div class="sync">
    <span class="live"><span class="ldot"></span>실시간 연동</span>
    <span id="updatedAt"></span>
    <button class="refresh" id="refreshBtn" onclick="reload()">REFRESH</button>
  </div>

  <div class="hero-tag">
    <span class="flame">🔥</span>
    <h2>UPCOMING</h2>
    <span class="sub" id="upcomingSub"></span>
  </div>
  <div id="upcomingList">
    <div class="loader"><div class="spinner"></div>매치 정보를 불러오는 중…</div>
  </div>

  <button class="hist-toggle" id="histToggle">
    <span id="histToggleLabel">지난 전적 모아보기</span><span class="chev">›</span>
  </button>
  <div id="historySection">
    <div id="historyList"></div>
  </div>

  <footer>
    match_history 시트와 실시간으로 연동됩니다<br>
    <span style="color:var(--brass)">시트를 고치면, 새로고침 한 번이면 끝</span>
  </footer>
</div>

<script>
let LAST_DATA = null;

function reload(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin'); btn.textContent = '...';
  Promise.all([loadCollection(), loadFormat()])
    .then(()=>{ btn.classList.remove('spin'); btn.textContent='REFRESH'; })
    .catch(()=>{ btn.classList.remove('spin'); btn.textContent='REFRESH'; });
}

function loadCollection(){
  return new Promise((resolve)=>{
    google.script.run
      .withSuccessHandler(d=>{ LAST_DATA=d; renderAll(d); resolve(); })
      .withFailureHandler(e=>{ showError('upcomingList', e); resolve(); })
      .getCollectionData();
  });
}
function loadFormat(){
  return new Promise((resolve)=>{
    google.script.run
      .withSuccessHandler(d=>{ renderFormat(d); resolve(); })
      .withFailureHandler(e=>{ showError('formatList', e); resolve(); })
      .getFormatData();
  });
}

function esc(s){ const d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
function q(s){ return esc(s).replace(/'/g,"&#39;"); }

function goTo(url){
  if(!url) return;
  try{ window.top.location.href = url; } catch(e){ window.location.href = url; }
}
function openLink(url){
  if(!url) return;
  try{ window.top.open(url, '_blank'); } catch(e){ window.open(url, '_blank'); }
}

function matchCard(item, opts){
  const clickable = !!item.siteUrl;
  const cls = 'card' + (opts.hist?' hist':'') + (opts.next?' next':'') + (clickable?' clickable':'');
  const onClick = clickable ? ` onclick="goTo('${q(item.siteUrl)}')"` : '';
  const badge = item.ready
    ? '<span class="badge ready">GO ▸</span>'
    : '<span class="badge wait">COMING SOON</span>';
  const sheetLink = item.sheetUrl
    ? `<span class="sheet-link" onclick="event.stopPropagation();openLink('${q(item.sheetUrl)}')">📄 원본 시트 보기</span>`
    : '';
  return `<div class="${cls}"${onClick}>
      <div class="card-body">
        <div class="card-row">
          <div class="card-main">
            <div class="card-date">${esc(item.dateRaw)}</div>
            <div class="card-name">${esc(item.name)}</div>
          </div>
          ${badge}
        </div>
        ${sheetLink}
      </div>
    </div>`;
}

function renderAll(d){
  document.getElementById('updatedAt').textContent = d.updatedAt ? `· ${d.updatedAt} 기준` : '';
  document.getElementById('upcomingSub').textContent = d.upcoming.length ? `${d.upcoming.length}개 예정` : '';

  const upEl = document.getElementById('upcomingList');
  if(!d.upcoming.length){
    upEl.innerHTML = `<div class="empty"><div class="ico">🎾</div>예정된 매치가 아직 없어요.<br>새 대회가 등록되면 여기 가장 먼저 뜹니다.</div>`;
  } else {
    upEl.innerHTML = d.upcoming.map((m,i)=>matchCard(m,{hist:false, next:i===0})).join('');
  }

  const histToggle = document.getElementById('histToggle');
  const histLabel = document.getElementById('histToggleLabel');
  const histList = document.getElementById('historyList');
  if(!d.history.length){
    histToggle.classList.add('hidden');
  } else {
    histToggle.classList.remove('hidden');
    histLabel.textContent = `지난 전적 모아보기 (${d.history.length})`;
    histList.innerHTML = d.history.map(m=>matchCard(m,{hist:true, next:false})).join('');
  }
}

function showError(elId, e){
  document.getElementById(elId).innerHTML =
    `<div class="empty"><div class="ico">⚠️</div>불러오지 못했어요.<br>${esc((e&&e.message)||e)}</div>`;
}

const RES_ICON = { '교류전 sheet_format':'📐', 'reference_code':'💻' };
function renderFormat(d){
  const el = document.getElementById('formatList');
  if(!d.items.length){
    el.innerHTML = `<div class="empty"><div class="ico">📎</div>등록된 자료가 없어요.</div>`;
    return;
  }
  el.innerHTML = d.items.map(it=>`
    <div class="res-card" onclick="openLink('${q(it.url)}')">
      <div class="res-ico">${RES_ICON[it.label] || '🔗'}</div>
      <div>
        <div class="res-name">${esc(it.label)}</div>
        <div class="res-sub">탭해서 열기 →</div>
      </div>
    </div>
  `).join('');
}

// History 아코디언
document.getElementById('histToggle').onclick = ()=>{
  const btn = document.getElementById('histToggle');
  const sec = document.getElementById('historySection');
  const open = sec.classList.toggle('open');
  btn.classList.toggle('open', open);
};

// Format 사이드 패널
const fab = document.getElementById('formatFab');
const panel = document.getElementById('formatPanel');
const scrim = document.getElementById('scrim');
function openPanel(){ panel.classList.add('show'); scrim.classList.add('show'); }
function closePanel(){ panel.classList.remove('show'); scrim.classList.remove('show'); }
fab.onclick = openPanel;
scrim.onclick = closePanel;
document.getElementById('fpClose').onclick = closePanel;

reload();
</script>
</body>
</html>
